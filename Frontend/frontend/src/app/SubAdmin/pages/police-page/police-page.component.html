<button mat-button routerLink="/subadmin/police/register-police">
  Add Police
</button>

<div class="wrapper">
  @for (police of subadmin?.polices; track $index) {

  <mat-expansion-panel
    (opened)="panelOpenState.set(true)"
    (closed)="panelOpenState.set(false)"
    [expanded]="expandAll"
  >
    <mat-expansion-panel-header>
      <mat-panel-title>
        <p>
          <strong> Name : </strong>{{ police.designation }}
          {{ police.fullname }}
        </p>
      </mat-panel-title>
      <mat-panel-description>
        <button (click)="deleteById(police.policeId)">
          <mat-icon
            aria-hidden="false"
            aria-label="Example home icon"
            fontIcon="delete"
          ></mat-icon>
        </button>

        <button (click)="editById(police.policeId)">
          <mat-icon
            aria-hidden="false"
            aria-label="Example home icon"
            fontIcon="edit"
          ></mat-icon>
        </button>
      </mat-panel-description>
    </mat-expansion-panel-header>
    <p><strong>Police ID:</strong> {{ police.policeId }}</p>
    <p><strong>Phone:</strong> {{ police.phone }}</p>
    <p><strong>Email:</strong> {{ police.email }}</p>
    <p><strong>Gender:</strong> {{ police.gender }}</p>
    <p><strong>Designation:</strong> {{ police.designation }}</p>
  </mat-expansion-panel>
  }
</div>
