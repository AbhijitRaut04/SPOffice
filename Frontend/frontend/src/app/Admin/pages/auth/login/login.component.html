<div class="login-screen">
  <div class="login-container">
    <div class="title">
      <strong>Login Here</strong>
    </div>

    <form class="form" [formGroup]="reactiveForm" (ngSubmit)="submit()">
      <!-- Name Field -->
      <mat-form-field class="input-block" appearance="outline">
        <mat-label class="label">Name</mat-label>
        <input matInput formControlName="fullname" />
        <mat-error *ngIf="reactiveForm.get('fullname').hasError('required')">
          Name is required
        </mat-error>
      </mat-form-field>

      <!-- Enter Password -->
      <mat-form-field class="input-block" appearance="outline">
        <mat-label>Create password</mat-label>
        <input matInput [type]="hide1 ? 'password' : 'text'" formControlName="password" />
        <button class="toggle-btn" mat-icon-button matSuffix type="button" (click)="togglePasswordVisibility()"
          [attr.aria-label]="hide1 ? 'Show password' : 'Hide password'" [attr.aria-pressed]="!hide1">
          <mat-icon>{{ hide1 ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="reactiveForm.get('password').hasError('required')">
          Password is required
        </mat-error>
      </mat-form-field>
      <button class="submit-btn" type="submit">Log In</button>
    </form>
  </div>
</div>
