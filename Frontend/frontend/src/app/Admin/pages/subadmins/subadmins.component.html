<div class="request-container">
    @if (subadmins.length === 0) {
    <h6>Nothing here</h6>
    }
    @for(subadmin of subadmins; let i = $index; track subadmin.id){
    <div class="subadmin-detail" (click)="viewSubadmin(subadmin)">
        <h3>{{ i+1 }}</h3>
        <div>
            <h4>{{ subadmin.username }} - {{ subadmin.station }}</h4>
        </div>
    </div>
    }
</div>
