<div class="sub-nav">
  <app-back-btn></app-back-btn>
  <div class="sub-nav-title">
    <h1>क्षेत्र संपादित करा</h1>
  </div>
</div>
<div class="wrapper">
  <mat-card>
    <div class="card-content-wrapper">
      <div class="create-form">
        <form [formGroup]="areaForm" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="fill">
            <mat-label>क्षेत्राचे नाव</mat-label>
            <input
              matInput
              placeventNameeholder="क्षेत्राचे नाव प्रविष्ट करा"
              formControlName="areaName"
              required
            />
          </mat-form-field>

          <div class="heads">
            <mat-form-field>
              <mat-label>मुख्याधिकारी</mat-label>
              <input
                type="text"
                placeholder="मुख्य अधिकारी नाव प्रविष्ट करा"
                aria-label="Number"
                matInput
                formControlName="head"
                [matAutocomplete]="head"
                required
              />
              <mat-autocomplete
                #head="matAutocomplete"
                [displayWith]="displayPoliceName"
              >
                @for (option of filteredOptionsHead | async; track option) {
                <mat-option [value]="option">{{ option.fullname }}</mat-option>
                }
              </mat-autocomplete>
            </mat-form-field>
          </div>

          <mat-form-field appearance="fill">
            <mat-label>सहप्रमुख अधिकारी</mat-label>
            <input
              type="text"
              placeholder="सहप्रमुख अधिकारी नाव प्रविष्ट करा"
              aria-label="Number"
              matInput
              formControlName="cohead"
              [matAutocomplete]="cohead"
            />
            <mat-autocomplete
              #cohead="matAutocomplete"
              [displayWith]="displayPoliceName"
            >
              @for (option of filteredOptionsCohead | async; track option) {
              <mat-option [value]="option">{{ option.fullname }}</mat-option>
              }
            </mat-autocomplete>
          </mat-form-field>

          <button class="submit-button" mat-raised-button type="submit">
            क्षेत्र संपादित करा
          </button>
        </form>
      </div>
    </div>
  </mat-card>

  <app-sidebar [event]="event"></app-sidebar>
</div>
