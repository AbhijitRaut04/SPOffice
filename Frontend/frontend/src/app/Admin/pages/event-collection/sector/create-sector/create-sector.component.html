<div class="sub-nav">
    <app-back-btn></app-back-btn>
    <div class="sub-nav-title">
      <h1>Create Sector</h1>
    </div>
  </div>
  <div class="wrapper">
    <mat-card>
      <div class="card-content-wrapper">
        <div class="create-form">
          <form [formGroup]="sectorForm" (ngSubmit)="onSubmit()">
            <mat-form-field appearance="fill">
              <mat-label>Sector Name</mat-label>
              <input matInput placeventNameeholder="Enter sector name" formControlName="sectorName" required />
            </mat-form-field>
  
            <div class="heads">
              <mat-form-field>
                <mat-label>Head Officer</mat-label>
                <input 
                type="text" 
                placeholder="Enter head name" 
                aria-label="Number" 
                matInput 
                formControlName="head"
                [matAutocomplete]="head" 
                required />
                <mat-autocomplete #head="matAutocomplete" [displayWith]="displayPoliceName">
                  @for (option of filteredOptionsHead | async; track option) {
                  <mat-option [value]="option">{{ option.fullname }}</mat-option>
                  }
                </mat-autocomplete>
              </mat-form-field>
            </div>
  
            <button class="submit-button" mat-raised-button type="submit">
              Create Sector
            </button>
          </form>
        </div>
      </div>
    </mat-card>
  
    <app-sidebar [event]="event"></app-sidebar>
  </div>
